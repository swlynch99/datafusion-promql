[package]
name = "datafusion-promql"
version = "0.1.0"
edition = "2024"

[dependencies]
promql-parser = "0.8"
datafusion = "53"
arrow = { version = "58", features = ["prettyprint"] }
async-trait = "0.1"
thiserror = "2"
chrono = "0.4"
futures = "0.3"

[features]
parquet = ["datafusion/parquet"]

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
